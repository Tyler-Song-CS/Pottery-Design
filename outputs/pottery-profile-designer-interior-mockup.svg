<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800" role="img" aria-labelledby="title desc">
  <title id="title">iPhone 13 mockup for full pottery form designer with editable interior and raised foot ring</title>
  <desc id="desc">A mobile UI mockup showing a full pottery form design tool with outer and inner editable pot lines, raised foot ring controls, inch measurements, and clay body shading.</desc>
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="4" seed="9" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.93  0 0 0 0 0.88  0 0 0 0 0.78  0 0 0 0.13 0" result="tint"/>
      <feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
    </filter>
    <filter id="pencilJitter" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="14" result="jitter"/>
      <feDisplacementMap in="SourceGraphic" in2="jitter" scale="2.1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#1b1814" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="phoneEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27231e"/>
      <stop offset="0.55" stop-color="#15130f"/>
      <stop offset="1" stop-color="#42382c"/>
    </linearGradient>
    <linearGradient id="graphite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56524d"/>
      <stop offset="1" stop-color="#2b2925"/>
    </linearGradient>
    <pattern id="paperGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cfc5b2" stroke-width="1" opacity="0.24"/>
    </pattern>
    <style>
      .bg { fill: #d8d0c2; }
      .phone { fill: url(#phoneEdge); }
      .screen { fill: #f5eedf; }
      .paper { fill: #f5eedf; filter: url(#paperNoise); }
      .muted { fill: #6f675d; }
      .panel { fill: #fbf6ea; stroke: #cfc4af; stroke-width: 2; }
      .tabText { fill: #6c6256; font-size: 24px; font-weight: 650; }
      .tabActive { fill: #3b3730; }
      .small { font-size: 22px; }
      .tiny { font-size: 18px; }
      .label { font-size: 24px; font-weight: 650; fill: #302d28; }
      .value { font-size: 29px; font-weight: 760; fill: #2f2a24; }
      .note { font-size: 19px; fill: #756b60; }
      .caption { font-size: 21px; fill: #6f675d; }
      .dimension { stroke: #746b60; stroke-width: 2; stroke-linecap: round; fill: none; opacity: 0.8; }
      .construction { stroke: #8e8374; stroke-width: 1.5; stroke-dasharray: 8 8; fill: none; opacity: 0.36; }
      .outer { stroke: url(#graphite); stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: url(#pencilJitter); }
      .inner { stroke: #426858; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: url(#pencilJitter); }
      .clay { fill: #cdbb9c; opacity: 0.34; filter: url(#pencilJitter); }
      .recess { fill: #9f8d70; opacity: 0.30; filter: url(#pencilJitter); }
      .point { fill: #f4eee0; stroke: #30302d; stroke-width: 4; }
      .minorPoint { fill: #746b60; opacity: 0.48; }
      .innerPoint { fill: #dce9e1; stroke: #2d5547; stroke-width: 4; }
      .pointActive { fill: #d9e4dd; stroke: #253a31; stroke-width: 5; }
      .activeEdge { stroke: #253a31; stroke-width: 8; stroke-linecap: round; filter: url(#pencilJitter); }
      .focusBox { stroke: #253a31; stroke-width: 3; stroke-dasharray: 10 8; fill: none; opacity: 0.72; }
      .zoomFrame { fill: #f7f0e2; stroke: #d8cbb7; stroke-width: 2; }
      .zoomClay { fill: #cdbb9c; opacity: 0.38; }
      .zoomRecess { fill: #9f8d70; opacity: 0.32; }
      .zoomOuter { stroke: url(#graphite); stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sectionChip { fill: #efe5d3; stroke: #cabda7; stroke-width: 2; }
      .sectionChipActive { fill: #3b3730; }
      .rule { stroke: #d6cab6; stroke-width: 2; }
      .track { stroke: #d7cbb8; stroke-width: 12; stroke-linecap: round; }
      .trackFill { stroke: #45695a; stroke-width: 12; stroke-linecap: round; }
      .thumb { fill: #34302a; }
      .buttonIcon { stroke: #312d27; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      text { font-family: Inter, "SF Pro Display", Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1800"/>
  <rect x="0" y="0" width="1200" height="1800" fill="url(#paperGrid)" opacity="0.22"/>

  <g transform="translate(198 72)" filter="url(#softShadow)">
    <rect class="phone" x="0" y="0" width="804" height="1656" rx="86"/>
    <rect x="36" y="36" width="732" height="1584" rx="62" fill="#0f0e0b"/>
    <rect class="screen" x="52" y="52" width="700" height="1552" rx="48"/>
    <rect class="paper" x="52" y="52" width="700" height="1552" rx="48"/>

    <g transform="translate(86 78)">
      <text x="0" y="26" class="tiny muted" font-weight="700">9:41</text>
      <g transform="translate(566 6)">
        <rect x="0" y="0" width="34" height="16" rx="3" fill="none" stroke="#35312a" stroke-width="2"/>
        <rect x="3" y="3" width="24" height="10" rx="2" fill="#35312a"/>
        <rect x="37" y="5" width="4" height="6" rx="2" fill="#35312a"/>
      </g>
    </g>

    <g transform="translate(82 136)">
      <circle cx="24" cy="24" r="22" fill="#efe5d3" stroke="#cabda7" stroke-width="2"/>
      <path class="buttonIcon" d="M30 15 L20 25 L30 35"/>
      <text x="76" y="23" class="small muted" font-weight="700">ClayForm</text>
      <text x="76" y="58" class="value">Small vase</text>
      <g transform="translate(438 2)">
        <circle cx="24" cy="24" r="22" fill="#efe5d3" stroke="#cabda7" stroke-width="2"/>
        <path class="buttonIcon" d="M16 24 C16 16 23 11 31 15 M31 15 L31 8 M31 15 L24 17"/>
      </g>
