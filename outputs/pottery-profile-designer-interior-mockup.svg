        <path class="buttonIcon" d="M30 24 C30 16 23 11 15 15 M15 15 L15 8 M15 15 L22 17"/>
      </g>
      <g transform="translate(562 2)">
        <circle cx="24" cy="24" r="22" fill="#2f2a24"/>
        <path d="M16 15 H29 L35 21 V35 H16 Z" fill="none" stroke="#f7f0e2" stroke-width="3" stroke-linejoin="round"/>
        <path d="M20 15 V22 H31" fill="none" stroke="#f7f0e2" stroke-width="3"/>
      </g>
    </g>

    <g transform="translate(82 230)">
      <rect x="0" y="0" width="588" height="54" rx="27" fill="#ede2ce" stroke="#cfc0aa" stroke-width="2"/>
      <rect class="tabActive" x="5" y="5" width="190" height="44" rx="22"/>
      <text x="63" y="35" font-size="22" font-weight="760" fill="#fff7e8">Design</text>
      <text class="tabText" x="226" y="35">Interior</text>
      <text class="tabText" x="424" y="35">Template</text>
    </g>

    <g transform="translate(82 312)">
      <rect class="panel" x="0" y="0" width="588" height="760" rx="18"/>
      <rect x="18" y="18" width="552" height="724" rx="10" fill="#f7f0e2" opacity="0.72"/>
      <g opacity="0.42">
        <path class="rule" d="M76 70 H532"/>
        <path class="rule" d="M76 158 H532"/>
        <path class="rule" d="M76 246 H532"/>
        <path class="rule" d="M76 334 H532"/>
        <path class="rule" d="M76 422 H532"/>
        <path class="rule" d="M76 510 H532"/>
        <path class="rule" d="M76 598 H532"/>
      </g>

      <text x="24" y="43" class="caption" font-weight="760">Finished section - Foot zoom</text>
      <g transform="translate(350 22)">
        <circle cx="8" cy="8" r="6" fill="#302d28"/>
        <text x="22" y="15" class="tiny muted" font-weight="760">outer</text>
        <circle cx="100" cy="8" r="6" fill="#426858"/>
        <text x="114" y="15" class="tiny muted" font-weight="760">inner</text>
      </g>

      <g transform="translate(0 32)">
        <path class="construction" d="M294 70 V668"/>
        <path class="construction" d="M96 636 H492"/>
        <path class="construction" d="M96 360 H492"/>
        <path class="construction" d="M204 382 H384"/>

        <path class="clay" d="M96 360
          C100 264 112 176 132 92
          L456 92
          C476 176 488 264 492 360
          L492 636
          L418 636
          L384 382
          L204 382
          L170 636
          L96 636
          Z
          M206 252
          C230 274 358 274 382 252
          C376 212 366 156 354 112
          L234 112
          C222 156 212 212 206 252
          Z"/>
        <path class="recess" d="M204 382 L384 382 L418 636 L492 636 L492 516 L424 516 L392 382 L196 382 L164 516 L96 516 L96 636 L170 636 Z"/>

        <path class="outer" d="M96 360
          C100 264 112 176 132 92"/>
        <path class="outer" d="M492 360
          C488 264 476 176 456 92"/>
        <path class="outer" d="M96 360 L96 636 L170 636 L204 382 L384 382 L418 636 L492 636 L492 360"/>

        <path class="inner" d="M206 252
          C212 212 222 156 234 112"/>
        <path class="inner" d="M382 252
          C376 212 366 156 354 112"/>
        <path class="inner" d="M206 252 C230 274 358 274 382 252"/>

        <circle class="pointActive" cx="96" cy="360" r="14"/>
        <circle class="pointActive" cx="96" cy="636" r="14"/>
        <circle class="pointActive" cx="170" cy="636" r="14"/>
        <circle class="pointActive" cx="204" cy="382" r="14"/>
        <circle class="pointActive" cx="384" cy="382" r="14"/>
        <circle class="pointActive" cx="418" cy="636" r="14"/>
        <circle class="pointActive" cx="492" cy="636" r="14"/>
        <circle class="pointActive" cx="492" cy="360" r="14"/>

        <circle class="innerPoint" cx="206" cy="252" r="10"/>
        <circle class="innerPoint" cx="382" cy="252" r="10"/>

        <path class="dimension" d="M96 360 H492"/>
        <path class="dimension" d="M96 348 V372"/>
        <path class="dimension" d="M492 348 V372"/>
        <text x="214" y="342" class="tiny muted" font-weight="760">2.25 in raised ring</text>

        <path class="dimension" d="M522 360 V636"/>
        <path class="dimension" d="M492 360 H532"/>
        <path class="dimension" d="M492 636 H532"/>
        <text x="538" y="514" class="tiny muted" font-weight="760" transform="rotate(90 538 514)">0.38 in raised foot</text>

        <path class="dimension" d="M204 382 H384"/>
        <path class="dimension" d="M204 370 V394"/>
        <path class="dimension" d="M384 370 V394"/>
        <text x="220" y="424" class="tiny muted" font-weight="760">center recess</text>

        <g transform="translate(30 558)">
          <rect x="0" y="0" width="158" height="50" rx="25" fill="#eee3d0" stroke="#ccbea7" stroke-width="2"/>
          <circle cx="25" cy="25" r="8" fill="#c7b79c"/>
          <text x="45" y="32" class="tiny muted" font-weight="760">zoom 3x</text>
        </g>
      </g>
    </g>

    <g transform="translate(82 1094)">
      <rect class="panel" x="0" y="0" width="588" height="176" rx="18"/>
      <text x="24" y="42" class="label">Section</text>
      <rect x="198" y="16" width="128" height="42" rx="21" fill="#efe5d3" stroke="#cabda7" stroke-width="2"/>
      <text x="220" y="43" class="tiny muted" font-weight="760">Clay 1.7 lb</text>
      <rect x="350" y="16" width="96" height="42" rx="21" fill="#3b3730"/>
      <text x="376" y="43" class="tiny" font-weight="760" fill="#fff7e8">Outer</text>
      <rect x="456" y="16" width="108" height="42" rx="21" fill="#ede2ce" stroke="#cfc0aa" stroke-width="2"/>
      <text x="486" y="43" class="tiny muted" font-weight="760">Inner</text>
      <path class="rule" d="M24 66 H564"/>
      <g transform="translate(24 86)">
        <rect class="sectionChip" x="0" y="0" width="112" height="44" rx="22"/>
        <text x="35" y="29" class="tiny muted" font-weight="760">Rim</text>
        <rect class="sectionChip" x="126" y="0" width="112" height="44" rx="22"/>
        <text x="158" y="29" class="tiny muted" font-weight="760">Belly</text>
        <rect class="sectionChip" x="252" y="0" width="112" height="44" rx="22"/>
        <text x="286" y="29" class="tiny muted" font-weight="760">Wall</text>
        <rect class="sectionChipActive" x="378" y="0" width="112" height="44" rx="22"/>
        <text x="412" y="29" class="tiny" font-weight="760" fill="#fff7e8">Foot</text>
      </g>
      <text x="24" y="154" class="note" font-weight="760">Selected</text>
      <text x="116" y="154" class="caption" font-weight="760">Foot ring</text>
    </g>

    <g transform="translate(82 1292)">
      <rect class="panel" x="0" y="0" width="588" height="218" rx="18"/>
      <text x="24" y="42" class="label">Foot controls</text>
      <rect x="428" y="16" width="136" height="42" rx="21" fill="#efe5d3" stroke="#cabda7" stroke-width="2"/>
      <text x="464" y="43" class="tiny muted" font-weight="760">Full view</text>
      <g transform="translate(24 78)">
