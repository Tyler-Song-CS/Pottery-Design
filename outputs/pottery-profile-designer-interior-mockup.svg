      <rect x="206" y="0" width="176" height="52" rx="26" fill="#efe5d3" stroke="#cabda7" stroke-width="2"/>
      <text x="270" y="34" class="small muted" font-weight="760">Inches</text>
      <rect x="412" y="0" width="176" height="52" rx="26" fill="#2f2a24"/>
      <text x="472" y="34" class="small" font-weight="760" fill="#fff7e8">Export</text>
    </g>
  </g>
</svg>
