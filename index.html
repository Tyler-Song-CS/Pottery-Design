<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ClayForm Designer</title>
    <link rel="stylesheet" href="styles.css?v=20260623-persistence-1">
  </head>
  <body>
    <main class="app-shell" aria-label="ClayForm pottery profile designer">
      <header class="topbar">
        <div>
          <p class="eyebrow">ClayForm</p>
          <h1>Small vase</h1>
        </div>
        <div class="top-actions" aria-label="Document actions">
          <button class="icon-button dark" type="button" aria-label="Save">S</button>
        </div>
      </header>

      <section class="canvas-card" aria-labelledby="canvasTitle">
        <div class="canvas-header">
          <h2 id="canvasTitle">Profile</h2>
          <div class="legend" aria-label="Line legend">
            <span><i class="legend-dot outer-dot"></i>Outer</span>
            <span><i class="legend-dot inner-dot"></i>Inner</span>
          </div>
        </div>
        <svg id="profileCanvas" class="profile-canvas" viewBox="0 0 588 640" role="img" aria-label="Editable pottery section drawing"></svg>
      </section>

      <section id="bottomInspector" class="bottom-inspector" aria-label="Editing controls">
        <button id="inspectorToggle" class="sheet-toggle" type="button" aria-expanded="true" aria-label="Minimize controls">
          <span aria-hidden="true"></span>
        </button>

        <div class="compact-inspector" aria-label="Collapsed editing controls">
          <button id="compactSelectedButton" class="compact-selected" type="button" aria-label="Expand controls">
            <span>Selected</span>
            <strong id="compactSelectedLabel">Belly point</strong>
          </button>
          <div class="compact-actions">
            <div class="compact-toggle" aria-label="Editing line">
              <button type="button" data-compact-line="outer">Outer</button>
              <button type="button" data-compact-line="inner">Inner</button>
            </div>
            <div class="compact-toggle" aria-label="Profile editing">
              <button type="button" data-compact-kind="point">Point</button>
              <button type="button" data-compact-kind="segment">Line</button>
            </div>
          </div>
        </div>

        <div class="inspector-summary" aria-label="Current selection">
          <span id="selectedMeta">Outer point</span>
          <strong id="selectedLabel">Belly point</strong>
        </div>

        <section class="panel section-panel" aria-labelledby="sectionTitle">
          <h2 id="sectionTitle" class="visually-hidden">Edit</h2>
          <div class="edit-toolbar" aria-label="Edit context">
            <div class="line-toggle" aria-label="Wall">
              <button id="outerLineButton" class="active" type="button">Outer</button>
              <button id="innerLineButton" type="button">Inner</button>
            </div>

            <div class="mode-toggle" role="group" aria-label="Selection type">
              <button id="pointModeButton" class="section-chip active" type="button">Point</button>
              <button id="segmentModeButton" class="section-chip" type="button">Line</button>
            </div>

            <div class="edit-actions" aria-label="Point actions">
              <button id="addPointButton" class="tool-button" type="button" aria-label="Add point">+</button>
              <button id="deletePointButton" class="tool-button" type="button" aria-label="Delete point">Del</button>
            </div>
          </div>
        </section>

        <section class="panel controls-panel" aria-labelledby="controlsTitle">
          <div class="panel-header">
            <h2 id="controlsTitle">Point controls</h2>
          </div>

          <div id="sectionControls" class="control-stack"></div>
          <label id="uniformWallControl" class="toggle">
            <input id="uniformWallToggle" type="checkbox" checked>
            <span>Uniform wall</span>
          </label>
        </section>

        <footer class="bottom-bar" aria-label="Design settings">
          <h2 class="settings-heading">Design settings</h2>
          <button id="clayEstimate" class="bottom-field clay-field" type="button" aria-label="Clay estimate details">
            <span>Clay needed</span>
            <strong id="clayEstimateValue">1.7 lb</strong>
          </button>
          <div class="basis-toggle" role="group" aria-label="Size basis">
            <button id="finishedBasis" class="active" type="button">Finished size</button>
            <button id="wetBasis" type="button">Wet size</button>
          </div>
          <label class="bottom-field shrink-field">
            <span>Shrinkage</span>
            <span class="shrink-value">
              <input id="shrinkageInput" type="number" min="0" max="30" step="0.5" value="12">
              <span>%</span>
            </span>
          </label>
        </footer>
      </section>
    </main>

    <template id="rangeControlTemplate">
      <label class="range-control">
        <span class="control-label"></span>
        <input type="range">
        <output></output>
      </label>
    </template>

    <script src="app.js?v=20260623-persistence-1" defer></script>
  </body>
</html>
